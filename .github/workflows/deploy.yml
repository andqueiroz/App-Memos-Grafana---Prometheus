name: CI - Testes Locais

on:
  push:
    branches: [ "main" ]

jobs:
  test-kind:
    name: Test on KinD
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create k8s Kind Cluster
        uses: helm/kind-action@v1.5.0
      - name: Test Kubernetes Manifests
        run: |
          kubectl apply -f k8s/memos.yaml
          sleep 30
          kubectl get pods -A